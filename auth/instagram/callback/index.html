<script>
(function() {
  var params = new URLSearchParams(window.location.search);
  var code = params.get('code');
  var state = params.get('state') || '';
  var errorParam = params.get('error');
  if (errorParam) { window.location.href = '/?instagram_error=acceso_denegado'; return; }
  if (!code) { window.location.href = '/?instagram_error=falta_codigo'; return; }
  fetch('/api/instagram-callback?code=' + encodeURIComponent(code) + '&state=' + encodeURIComponent(state))
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.error) { window.location.href = '/?instagram_error=' + encodeURIComponent(data.error); }
      else { window.location.href = '/?instagram_connected=1&email=' + encodeURIComponent(data.email); }
    })
    .catch(function() { window.location.href = '/?instagram_error=error_de_red'; });
})();
</script>
