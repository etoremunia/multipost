<script>
(function() {
  var params = new URLSearchParams(window.location.search);
  var code = params.get('code');
  var email = params.get('email') || '';
  if (!code) { window.location.href = '/?tiktok_error=falta_codigo'; return; }
  fetch('/api/tiktok-callback?code=' + encodeURIComponent(code) + '&email=' + encodeURIComponent(email))
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.error) { window.location.href = '/?tiktok_error=' + encodeURIComponent(data.error); }
      else { window.location.href = '/?tiktok_connected=1&email=' + encodeURIComponent(email); }
    })
    .catch(function() { window.location.href = '/?tiktok_error=error_de_red'; });
})();
</script>
