[build]
  functions = "netlify/functions"
  publish = "."

[dev]
  functions = "netlify/functions"

[[redirects]]
  from = "/auth/youtube/callback"
  to = "/.netlify/functions/youtube-callback"
  status = 200

[[redirects]]
  from = "/auth/instagram/callback"
  to = "/.netlify/functions/instagram-callback"
  status = 200

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
